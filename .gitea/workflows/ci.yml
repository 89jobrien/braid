name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting
        run: |
          source ~/.cargo/env
          cargo fmt --all -- --check

      - name: Clippy
        run: |
          source ~/.cargo/env
          cargo clippy --workspace -- -D warnings

      - name: Test
        run: |
          source ~/.cargo/env
          cargo test --workspace
