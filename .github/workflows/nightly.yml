name: Nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  geiger:
    name: unsafe audit (geiger)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-geiger
        run: cargo install cargo-geiger --locked
      - name: cargo geiger
        id: geiger
        run: |
          cargo geiger --workspace 2>&1 | tee geiger-report.txt
          echo "## cargo geiger report" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -30 geiger-report.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: upload geiger report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: geiger-report
          path: geiger-report.txt
          retention-days: 30

  integration-agent:
    name: Integration (braid agent + ollama)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start ollama and pull model
        run: |
          ollama serve &
          sleep 3
          ollama pull qwen2:0.5b

      - name: Build braid
        run: cargo build --release

      - name: Run braid agent end-to-end
        run: |
          ./target/release/braid agent \
            --prompt "echo hello" \
            --provider ollama \
            --model qwen2:0.5b \
            --max-turns 1
        timeout-minutes: 5

  cross-compile:
    name: Cross-compile ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release binary
        run: cross build --release --target ${{ matrix.target }} -p braid-cli

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/braid-cli dist/
          tar -czf "braid-nightly-${{ matrix.target }}.tar.gz" -C dist braid-cli

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: braid-nightly-${{ matrix.target }}
          path: "*.tar.gz"
          retention-days: 7

  publish-nightly:
    name: Publish nightly release
    runs-on: ubuntu-latest
    needs: [integration-agent, cross-compile]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: braid-nightly-*
          path: artifacts
          merge-multiple: true

      - name: Create or update nightly release
        run: |
          gh release delete nightly --yes 2>/dev/null || true
          gh release create nightly \
            --title "Nightly $(date -u +%Y-%m-%d)" \
            --notes "Automated nightly build. Integration tests passed with ollama." \
            --prerelease \
            artifacts/*.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
